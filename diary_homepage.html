<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Diary Homepage</title>
    <style>
        body {
            background: #000000;
            font-family: 'Arial', sans-serif;
            color: #ff0000;
            text-align: center;
            padding: 50px;
            position: relative;
        }
        h1 {
            font-size: 3em;
            text-shadow: 0 0 10px #ff0000;
        }
        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .choice {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            text-decoration: none;
            color: #ff0000;
            font-size: 1.5em;
            transition: background 0.3s;
        }
        .choice:hover {
            background: #555;
        }
        .logout {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
        }
        .logout:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button class="logout" onclick="logout()">Logout</button>
    <h1>Welcome to My Secret Diary</h1>
    <p>Logged in as: <span id="user"></span></p>
    <div class="choices">
        <a href="diary_personal.html" class="choice">Personal</a>
        <a href="diary_education.html" class="choice">Education</a>
        <a href="diary_collection.html" class="choice">Collection</a>
        <a href="diary_family.html" class="choice">Family</a>
    </div>

    <script>
        const user = localStorage.getItem('currentUser');
        if (!user) {
            window.location.href = 'login.html';
        }
        document.getElementById('user').textContent = user;

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
