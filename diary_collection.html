<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diary - Collection</title>
    <style>
        body {
            background: #000000;
            font-family: 'Arial', sans-serif;
            color: #ff0000;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        .fade-in {
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            transition: all 0.3s;
            z-index: 100;
        }
        .back-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff0000;
        }
        h1 {
            font-size: 2.5em;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 30px;
        }
        .editable {
            border: 1px dashed #ff0000;
            padding: 15px;
            margin: 10px 0;
            background: #111;
            min-height: 100px;
            transition: all 0.3s;
        }
        .editable:hover {
            background: #222;
            box-shadow: 0 0 10px #ff0000;
        }
        .comment-section {
            margin-top: 50px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
        textarea {
            width: 100%;
            max-width: 500px;
            height: 80px;
            background: #222;
            color: white;
            border: 1px solid #ff0000;
            padding: 10px;
            border-radius: 5px;
            resize: none;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px 5px;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            background: #cc0000;
            box-shadow: 0 0 10px #ff0000;
        }
        .comments {
            margin-top: 20px;
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }
        .comment {
            background: #222;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #ff0000;
        }
        .comment-content {
            flex: 1;
        }
        .comment-actions {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <a href="diary_homepage.html" class="back-btn">Back to Diary Home</a>
    <h1 class="fade-in">Collection Diary</h1>
    
    <div id="content" class="fade-in">
        <p class="editable" contenteditable="false">
            <strong>My Collection:</strong><br>
            [Add your collections, hobbies, or favorite items here...]
        </p>
    </div>

    <div class="comment-section fade-in">
        <h2>Comments</h2>
        <div id="comment-input-section">
            <textarea id="comment-input" placeholder="Add a comment..."></textarea>
            <button onclick="addComment()">Submit Comment</button>
        </div>
        <div id="comments-list" class="comments"></div>
    </div>

    <script>
        const user = localStorage.getItem('currentUser');
        
        // Load saved content - COLLECTION ONLY
        const saved = localStorage.getItem('diary_collection');
        if (saved) {
            document.querySelector('.editable').innerHTML = saved;
        }
        
        // Owner can edit
        if (user === 'magandaako17') {
            document.querySelectorAll('.editable').forEach(el => el.contentEditable = 'true');
            document.querySelectorAll('.editable').forEach(el => {
                el.addEventListener('blur', () => {
                    localStorage.setItem('diary_collection', el.innerHTML);
                });
            });
            document.getElementById('comment-input-section').style.display = 'none';
        }

        // Comments - COLLECTION ONLY
        function addComment() {
            const comment = document.getElementById('comment-input').value;
            if (comment) {
                const comments = JSON.parse(localStorage.getItem('comments_collection')) || [];
                comments.push({ user, comment, date: new Date().toLocaleString(), id: Date.now() });
                localStorage.setItem('comments_collection', JSON.stringify(comments));
                document.getElementById('comment-input').value = '';
                loadComments();
            }
        }

        function loadComments() {
            const comments = JSON.parse(localStorage.getItem('comments_collection')) || [];
            const list = document.getElementById('comments-list');
            list.innerHTML = comments.map((c, index) => {
                let actions = '';
                if (user === 'magandaako17' || user === c.user) {
                    actions += `<button onclick="editComment(${index})">Edit</button>`;
                }
                if (user === 'magandaako17') {
                    actions += `<button onclick="deleteComment(${index})">Delete</button>`;
                }
                return `<div class="comment">
                    <div class="comment-content" id="comment-${index}"><strong>${c.user}:</strong> ${c.comment} <small>(${c.date})</small></div>
                    <div class="comment-actions">${actions}</div>
                </div>`;
            }).join('');
        }

        function editComment(index) {
            const commentDiv = document.getElementById(`comment-${index}`);
            const originalText = commentDiv.innerHTML;
            const currentComment = originalText.replace(/<[^>]*>/g, '').split(': ')[1].split(' <small>')[0];
            commentDiv.innerHTML = `<textarea id="edit-${index}" style="width: 100%; height: 60px; background: #333; color: white; border: 1px solid #ff0000;">${currentComment}</textarea><button onclick="saveEdit(${index})">Save</button><button onclick="cancelEdit(${index}, '${originalText.replace(/'/g, "\\'")}')">Cancel</button>`;
        }

        function saveEdit(index) {
            const newComment = document.getElementById(`edit-${index}`).value;
            const comments = JSON.parse(localStorage.getItem('comments_collection')) || [];
            comments[index].comment = newComment;
            localStorage.setItem('comments_collection', JSON.stringify(comments));
            loadComments();
        }

        function cancelEdit(index, originalText) {
            document.getElementById(`comment-${index}`).innerHTML = originalText;
        }

        function deleteComment(index) {
            if (confirm('Delete this comment?')) {
                const comments = JSON.parse(localStorage.getItem('comments_collection')) || [];
                comments.splice(index, 1);
                localStorage.setItem('comments_collection', JSON.stringify(comments));
                loadComments();
            }
        }

        loadComments();
    </script>
</body>
</html>
