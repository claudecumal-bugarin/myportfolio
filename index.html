<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Welcome to my personal portfolio - a glimpse into my world!">
    <title>My Personal World</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet"> <!-- For the fun font -->
    <style>
        body {
            background: linear-gradient(135deg, #2E4057, #34495E);
            font-family: 'Fredoka One', cursive;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            position: relative;
        }
        .content {
            text-align: center;
            animation: fadeIn 2s ease-in;
            z-index: 1;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(52, 152, 219, 0.5);
            animation: pulse 3s infinite;
        }
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #1ABC9C;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2em;
            transition: all 0.3s ease;
            border: 2px solid #16A085;
            box-shadow: none;
        }
        .btn:hover {
            background-color: #16A085;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 15px rgba(26, 188, 156, 0.7);
        }
        .secret-btn {
            background-color: #3498DB;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 20px;
            margin-top: 20px;
            display: inline-block;
            transition: all 0.3s ease;
            border: 2px solid #2980B9;
            box-shadow: none;
            z-index: 1;
        }
        .secret-btn:hover {
            background-color: #2980B9;
            transform: rotate(5deg) scale(1.05);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.7);
        }
        .pic-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            z-index: 1;
        }
        .pic1, .pic2, .pic4 {
            animation: fadeIn 3s ease-in;
            transition: transform 0.3s ease;
        }
        .pic1:hover, .pic2:hover, .pic4:hover {
            transform: scale(1.05) translateY(-5px);
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }
        .p {
            margin-top: 30px;
            font-size: 1.5em;
            opacity: 0.8;
            animation: fadeIn 4s ease-in, float 6s ease-in-out infinite;
            z-index: 1;
        }
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .buttons { flex-direction: column; align-items: center; }
            img { max-width: 90%; }
            .p { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>My Personal World</h1>
        <div class="buttons">
            <a href="personal.html" class="btn">PERSONAL</a>
            <a href="education.html" class="btn">EDUCATION</a>        	
            <a href="family.html" class="btn">FAMILY</a>
            <a href="collection.html" class="btn">COLLECTION</a>
        </div>
        <a href="login.html" class="secret-btn">🔒 Secret Diary</a>
    </div>
    
    <div class="pic-container">
        <div class="pic1">
            <img src="cinnamoroll.gif" alt="Cute Cinnamoroll character">
        </div>
        <div class="pic2">
            <img src="mybaby.gif" alt="My adorable baby">
        </div>
    </div>
    
    <canvas id="particle-canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let particles = [];
        function createParticles() {
            for (let i = 0; i < 50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speedX: Math.random() * 0.5 - 0.25,
                    speedY: Math.random() * 0.5 - 0.25,
                    opacity: Math.random() * 0.5 + 0.5
                });
            }
        }
        
        function updateParticles() {
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            });
        }
        
        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.fill();
            });
        }
        
        function animate() {
            updateParticles();
            drawParticles();
            requestAnimationFrame(animate);
        }
        
        createParticles();
        animate();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
