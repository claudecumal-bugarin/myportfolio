<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Diary Login</title>
    <style>
        body {
            background: linear-gradient(135deg, #000000, #333333);
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            padding: 50px;
            position: relative;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }
        form {
            max-width: 400px;
            margin: 0 auto;
            background: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ff0000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        button {
            background: #ff0000;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }
        button:hover {
            background: #cc0000;
        }
        .toggle {
            margin-top: 20px;
            cursor: pointer;
            color: #ff0000;
            text-align: center;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">Back to Main Site</a>
    <h1>Secret Diary Access</h1>
    <div id="login-form">
        <h2>Login</h2>
        <form id="login">
      <div style="position: relative; width: 100%; max-width: 300px;">
    <input type="password" id="login-password" placeholder="Password" required style="width: 100%; padding-right: 40px;">
    <span onclick="togglePassword('login-password', this)" 
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
        👁
    </span>
</div>
            <button type="submit">Login</button>
        </form>
        <p class="toggle" onclick="showSignUp()">Don't have an account? Sign Up</p>
    </div>
    <div id="signup-form" style="display: none;">
        <h2>Sign Up</h2>
        <form id="signup">
           <div style="position: relative; width: 100%; max-width: 300px;">
    <input type="password" id="signup-password" placeholder="Password" required style="width: 100%; padding-right: 40px;">
    <span onclick="togglePassword('signup-password', this)" 
          style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
        👁
    </span>
</div>
            <button type="submit">Sign Up</button>
        </form>
        <p class="toggle" onclick="showLogin()">Already have an account? Login</p>
    </div>

    <script>
    function showSignUp() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('signup-form').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
    }

    function togglePassword(id, element) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            element.textContent = "🙈";
        } else {
            input.type = "password";
            element.textContent = "👁";
        }
    }

    // Sign Up
    document.getElementById('signup').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('signup-username').value;
        const password = document.getElementById('signup-password').value;
        const accounts = JSON.parse(localStorage.getItem('diaryAccounts')) || {};

        if (accounts[username]) {
            alert('Username already exists!');
            return;
        }

        if (username === 'claudebugarin') {
            accounts[username] = 'kayjameslangkakalampag';
            alert('Owner account created with default password!');
        } else {
            accounts[username] = password;
        }

        localStorage.setItem('diaryAccounts', JSON.stringify(accounts));
        localStorage.setItem('currentUser', username);
        alert('Account created! Logging in...');
        window.location.href = 'diary_homepage.html';
    });

    // Login
    document.getElementById('login').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        const accounts = JSON.parse(localStorage.getItem('diaryAccounts')) || {};

        if (accounts[username] === password) {
            localStorage.setItem('currentUser', username);
            window.location.href = 'diary_homepage.html';
        } else {
            alert('Invalid username or password!');
        }
    });
</script>
</body>
</html>
